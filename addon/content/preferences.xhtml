<vbox
  id="zotero-ai-assistant-prefs"
  onload="
    Zotero.__addonInstance__.hooks.onPrefsEvent('load', {
      window: this.ownerDocument.defaultView,
    })
  "
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <linkset>
    <html:link rel="localization" href="zotero-ai-assistant-preferences.ftl" />
  </linkset>

  <groupbox>
    <caption label="DS Copilot" />
    <vbox style="display: flex; flex-direction: column; gap: 12px; padding: 8px 0;">
      <description data-l10n-id="ai-assistant-pref-description" />

      <hbox align="center">
        <label
          value="API Key"
          control="zotero-ai-assistant-pref-api-key"
          style="width: 120px;"
        />
        <html:input
          id="zotero-ai-assistant-pref-api-key"
          type="password"
          style="flex: 1; min-width: 0;"
        />
      </hbox>

      <hbox align="center">
        <label
          value="Model"
          control="zotero-ai-assistant-pref-model"
          style="width: 120px;"
        />
        <menulist id="zotero-ai-assistant-pref-model" style="flex: 1;">
          <menupopup>
            <menuitem label="deepseek-v4-flash" value="deepseek-v4-flash" />
            <menuitem label="deepseek-v4-pro" value="deepseek-v4-pro" />
          </menupopup>
        </menulist>
      </hbox>

      <hbox align="center">
        <label
          value="Max Context"
          control="zotero-ai-assistant-pref-max-context"
          style="width: 120px;"
        />
        <html:input
          id="zotero-ai-assistant-pref-max-context"
          type="number"
          min="1"
          step="1"
          style="flex: 1; min-width: 0;"
        />
      </hbox>

      <description data-l10n-id="ai-assistant-pref-model-help" />

      <hbox style="display: flex; gap: 8px; align-items: center; margin-top: 6px;">
        <button
          id="zotero-ai-assistant-pref-save"
          label="Save"
          data-l10n-id="ai-assistant-pref-save"
        />
        <button
          id="zotero-ai-assistant-pref-validate"
          label="Validate"
          data-l10n-id="ai-assistant-pref-validate"
        />
        <description
          id="zotero-ai-assistant-pref-status"
          style="margin-inline-start: 8px;"
        />
      </hbox>
    </vbox>
  </groupbox>
</vbox>
