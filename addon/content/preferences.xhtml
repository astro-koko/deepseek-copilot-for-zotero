<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/global.css"?>
<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml">
  <groupbox>
    <label value="AI Provider Settings" style="font-weight: bold; margin-bottom: 8px;"/>
    <vbox style="gap: 8px;">
      <hbox align="center">
        <label value="API Key:" style="width: 100px;"/>
        <textbox id="ai-assistant-api-key" type="password" preference="extensions.zotero.zotero-ai-assistant.apiKey" style="flex: 1;"/>
      </hbox>
      <hbox align="center">
        <label value="Base URL:" style="width: 100px;"/>
        <textbox id="ai-assistant-base-url" preference="extensions.zotero.zotero-ai-assistant.baseURL" style="flex: 1;"/>
      </hbox>
      <hbox align="center">
        <label value="Model:" style="width: 100px;"/>
        <textbox id="ai-assistant-model" preference="extensions.zotero.zotero-ai-assistant.model" style="flex: 1;"/>
      </hbox>
      <hbox align="center">
        <label value="Max Context:" style="width: 100px;"/>
        <textbox id="ai-assistant-max-context" preference="extensions.zotero.zotero-ai-assistant.maxContextBudget" type="number" style="flex: 1;"/>
      </hbox>
    </vbox>
  </groupbox>
</vbox>
