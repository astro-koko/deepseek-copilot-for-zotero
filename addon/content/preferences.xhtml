<vbox
  id="zotero-ai-assistant-prefs"
  onload="
    Zotero.__addonInstance__.hooks.onPrefsEvent('load', {
      window: this.ownerDocument.defaultView,
    })
  "
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <linkset>
    <html:link rel="localization" href="zotero-ai-assistant-preferences.ftl" />
  </linkset>

  <groupbox>
    <caption label="Deepseek Copliot" />
    <vbox
      style="display: flex; flex-direction: column; gap: 12px; padding: 8px 0"
    >
      <description data-l10n-id="ai-assistant-pref-description" />

      <hbox align="center">
        <label
          value="DeepSeek API Key"
          data-l10n-id="ai-assistant-pref-api-key-label"
          control="zotero-ai-assistant-pref-api-key"
          style="width: 120px"
        />
        <html:input
          id="zotero-ai-assistant-pref-api-key"
          type="password"
          style="flex: 1; min-width: 0"
        />
      </hbox>

      <description data-l10n-id="ai-assistant-pref-api-key-help" />
      <html:div style="margin-top: -6px">
        <html:a
          id="zotero-ai-assistant-pref-api-key-link"
          href="https://platform.deepseek.com/"
          data-l10n-id="ai-assistant-pref-api-key-link"
          style="color: #0a66cc; text-decoration: underline; cursor: pointer"
        ></html:a>
      </html:div>

      <hbox
        style="display: flex; gap: 8px; align-items: center; margin-top: 6px"
      >
        <button
          id="zotero-ai-assistant-pref-save"
          label="Save"
          data-l10n-id="ai-assistant-pref-save"
        />
        <button
          id="zotero-ai-assistant-pref-validate"
          label="Validate"
          data-l10n-id="ai-assistant-pref-validate"
        />
        <description
          id="zotero-ai-assistant-pref-status"
          style="margin-inline-start: 8px"
        />
      </hbox>

      <separator class="thin" />

      <description data-l10n-id="ai-assistant-pref-custom-presets-title" />
      <description data-l10n-id="ai-assistant-pref-custom-presets-help" />
      <html:textarea
        id="zotero-ai-assistant-pref-custom-presets"
        spellcheck="false"
        style="
          min-height: 160px;
          width: 100%;
          box-sizing: border-box;
          font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          font-size: 12px;
          padding: 8px;
          border-radius: 6px;
        "
        placeholder='[{"id":"summarize","mode":"replace","label":"总结实验","promptPrefix":"请重点总结实验设计、数据集、指标和关键结果。","aliases":["实验","结果"]},{"id":"future-work","label":"未来工作","description":"提出后续研究方向","promptPrefix":"请基于当前论文提出 3 个可执行的后续研究方向。","scopeHint":["paper","pdf"],"aliases":["future","后续"]}]'
      ></html:textarea>
      <description
        id="zotero-ai-assistant-pref-custom-presets-status"
        style="margin-top: -4px"
      />

      <separator class="thin" />

      <description data-l10n-id="ai-assistant-pref-evidence-description" />

      <vbox style="display: flex; flex-direction: column; gap: 6px">
        <label
          value="Evidence Provider"
          data-l10n-id="ai-assistant-pref-evidence-provider-label"
          control="zotero-ai-assistant-pref-evidence-provider"
          style="width: 120px"
        />
        <html:select
          id="zotero-ai-assistant-pref-evidence-provider"
          style="
            min-width: 320px;
            max-width: 520px;
            padding: 6px 8px;
            border-radius: 6px;
          "
        >
          <html:option
            value="mcp-web-search"
            data-l10n-id="ai-assistant-pref-evidence-provider-builtin"
          >
            Default web verification (recommended, no API key)
          </html:option>
          <html:option
            value="tavily"
            data-l10n-id="ai-assistant-pref-evidence-provider-tavily"
          >
            Tavily web verification (requires API key)
          </html:option>
        </html:select>
        <description data-l10n-id="ai-assistant-pref-evidence-provider-help" />
      </vbox>

      <vbox
        id="zotero-ai-assistant-pref-tavily-settings"
        style="
          display: none;
          flex-direction: column;
          gap: 10px;
          padding: 12px;
          border: 1px solid rgba(10, 102, 204, 0.35);
          border-radius: 8px;
          background: rgba(10, 102, 204, 0.06);
        "
      >
        <description
          data-l10n-id="ai-assistant-pref-tavily-settings-title"
          style="font-weight: 600; margin: 0"
        />

        <hbox align="center">
          <label
            value="Tavily API Key"
            data-l10n-id="ai-assistant-pref-tavily-api-key-label"
            control="zotero-ai-assistant-pref-tavily-api-key"
            style="width: 120px"
          />
          <html:input
            id="zotero-ai-assistant-pref-tavily-api-key"
            type="password"
            style="flex: 1; min-width: 0"
          />
        </hbox>

        <description data-l10n-id="ai-assistant-pref-tavily-help" />
        <html:div style="margin-top: -4px">
          <html:a
            id="zotero-ai-assistant-pref-tavily-link"
            href="https://app.tavily.com/"
            data-l10n-id="ai-assistant-pref-tavily-link"
            style="color: #0a66cc; text-decoration: underline; cursor: pointer"
          ></html:a>
        </html:div>

        <hbox style="display: flex; gap: 8px; align-items: center">
          <button
            id="zotero-ai-assistant-pref-tavily-validate"
            label="Validate Tavily"
            data-l10n-id="ai-assistant-pref-tavily-validate"
          />
          <description
            id="zotero-ai-assistant-pref-tavily-status"
            style="margin-inline-start: 8px"
          />
        </hbox>
      </vbox>
    </vbox>
  </groupbox>
</vbox>
